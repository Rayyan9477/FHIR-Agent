name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: lint • types • tests (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: set up python
        run: uv python install ${{ matrix.python }}

      - name: sync deps
        run: uv sync --extra dev

      - name: ruff check
        run: uv run ruff check . --output-format=github

      - name: ruff format check
        run: uv run ruff format --check .

      - name: mypy strict
        run: uv run mypy medrec_superpower

      - name: schema export drift check
        # The Coordinator agent config references agents/schemas/*.json.
        # Catch silent drift between Pydantic models and committed schemas.
        run: uv run python scripts/export_schemas.py --check

      - name: pytest with coverage
        run: uv run pytest

      - name: upload coverage
        if: matrix.python == '3.13'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  security:
    name: dependency + source audit
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: set up python
        run: uv python install 3.13

      - name: sync deps
        run: uv sync --extra dev

      - name: export third-party requirements
        # pip-audit cannot resolve our own unpublished package via PyPI; export
        # the lock file with --no-emit-project so audit covers only deps. The
        # exported file already lists the full resolved set, so --no-deps is
        # required when paired with --disable-pip.
        run: uv export --quiet --no-hashes --no-emit-project --format requirements-txt > requirements.audit.txt

      - name: pip-audit
        run: uv run pip-audit --strict --disable-pip --no-deps --requirement requirements.audit.txt

      - name: bandit
        run: uv run bandit -q -r medrec_superpower
